# tar命令行方法简单说明

## 压缩

```bash
tar -czvf ***.tar.gz

tar -cjvf ***.tar.bz2
```

## 解压缩

```bash
tar -xzvf ***.tar.gz

tar -xjvf ***.tar.bz
```
